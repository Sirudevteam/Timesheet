<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </radialGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bgGrad)" filter="url(#shadow)"/>
  
  <!-- Film Reel Icon -->
  <g transform="translate(200, 140)">
    <!-- Reel Circle -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#redGrad)" stroke-width="6"/>
    <circle cx="0" cy="0" r="15" fill="#dc2626"/>
    
    <!-- Film Holes -->
    <circle cx="0" cy="-35" r="6" fill="#dc2626"/>
    <circle cx="30" cy="-18" r="6" fill="#dc2626"/>
    <circle cx="30" cy="18" r="6" fill="#dc2626"/>
    <circle cx="0" cy="35" r="6" fill="#dc2626"/>
    <circle cx="-30" cy="18" r="6" fill="#dc2626"/>
    <circle cx="-30" cy="-18" r="6" fill="#dc2626"/>
    
    <!-- Film Strip -->
    <rect x="-8" y="50" width="16" height="40" fill="#dc2626" rx="2"/>
    <rect x="-25" y="75" width="50" height="8" fill="#dc2626" rx="2"/>
  </g>
  
  <!-- Brand Name -->
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#1f2937">
    Blitz<tspan fill="#dc2626">&amp;</tspan>Glitz
  </text>
  
  <!-- Tagline -->
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#6b7280" letter-spacing="2">
    DIGITAL CAMERA CONVERSATIONS
  </text>
</svg>