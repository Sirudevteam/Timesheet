<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Blitz & Glitz Attendance System</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Scripts -->
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        async function initProfilePage() {
            const content = document.getElementById('mainContent');
            const profile = auth.getCurrentUserProfile();
            const user = auth.getCurrentUser();
            
            content.innerHTML = `
                <div class="animate-slide-up">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-8);">
                        <!-- Profile Card -->
                        <div class="card">
                            <div class="card-header">
                                <h3 class="card-title">Profile Information</h3>
                            </div>
                            <div class="card-body">
                                <div style="text-align: center; margin-bottom: var(--space-8);">
                                    <div style="
                                        width: 120px;
                                        height: 120px;
                                        border-radius: var(--radius-full);
                                        background: var(--primary-gradient);
                                        display: flex;
                                        align-items: center;
                                        justify-content: center;
                                        margin: 0 auto var(--space-4);
                                        color: white;
                                        font-size: 3rem;
                                        font-weight: 700;
                                        box-shadow: var(--shadow-primary);
                                    ">
                                        ${auth.getUserInitials(profile?.name)}
                                    </div>
                                    <h3 style="margin-bottom: var(--space-1);">${profile?.name}</h3>
                                    <span class="status-badge ${profile?.role === 'admin' ? 'info' : 'success'}">
                                        ${profile?.role === 'admin' ? 'Administrator' : 'Team Member'}
                                    </span>
                                </div>
                                
                                <form id="profileForm">
                                    <div class="form-group">
                                        <label class="form-label">Full Name</label>
                                        <input type="text" class="form-input" id="profileName" 
                                            value="${profile?.name || ''}" required>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label class="form-label">Email Address</label>
                                        <input type="email" class="form-input" value="${profile?.email || ''}" disabled>
                                        <p class="form-hint">Email cannot be changed</p>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label class="form-label">Department</label>
                                        <input type="text" class="form-input" id="profileDept" 
                                            value="${profile?.department || 'General'}">
                                    </div>
                                    
                                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                                        <i class="fas fa-save"></i> Save Changes
                                    </button>
                                </form>
                            </div>
                        </div>
                        
                        <!-- Security Card -->
                        <div>
                            <div class="card" style="margin-bottom: var(--space-6);">
                                <div class="card-header">
                                    <h3 class="card-title">Change Password</h3>
                                </div>
                                <div class="card-body">
                                    <form id="passwordForm">
                                        <div class="form-group">
                                            <label class="form-label">Current Password</label>
                                            <input type="password" class="form-input" id="currentPassword" required>
                                        </div>
                                        
                                        <div class="form-group">
                                            <label class="form-label">New Password</label>
                                            <input type="password" class="form-input" id="newPassword" required
                                                minlength="6" placeholder="At least 6 characters">
                                        </div>
                                        
                                        <div class="form-group">
                                            <label class="form-label">Confirm New Password</label>
                                            <input type="password" class="form-input" id="confirmPassword" required>
                                        </div>
                                        
                                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                                            <i class="fas fa-key"></i> Update Password
                                        </button>
                                    </form>
                                </div>
                            </div>
                            
                            <div class="card">
                                <div class="card-header">
                                    <h3 class="card-title">Account Info</h3>
                                </div>
                                <div class="card-body">
                                    <div style="display: flex; flex-direction: column; gap: var(--space-4);">
                                        <div style="display: flex; justify-content: space-between;">
                                            <span style="color: var(--gray-500);">Member Since</span>
                                            <span style="font-weight: 500;">${new Date(profile?.created_at).toLocaleDateString()}</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between;">
                                            <span style="color: var(--gray-500);">User ID</span>
                                            <span style="font-family: var(--font-mono); font-size: 0.875rem;">${profile?.id?.substring(0, 8)}...</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between;">
                                            <span style="color: var(--gray-500);">Last Updated</span>
                                            <span style="font-weight: 500;">${new Date(profile?.updated_at).toLocaleDateString()}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="card-footer">
                                    <button class="btn btn-danger" style="width: 100%;" onclick="signOutAll()">
                                        <i class="fas fa-sign-out-alt"></i> Sign Out
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Setup form handlers
            document.getElementById('profileForm').addEventListener('submit', handleProfileUpdate);
            document.getElementById('passwordForm').addEventListener('submit', handlePasswordUpdate);
        }
        
        async function handleProfileUpdate(e) {
            e.preventDefault();
            
            const updates = {
                name: document.getElementById('profileName').value,
                department: document.getElementById('profileDept').value
            };
            
            const result = await admin.updateUser(auth.getCurrentUser().id, updates);
            
            if (result.success) {
                await auth.loadUserProfile();
                setupSidebar();
            }
        }
        
        async function handlePasswordUpdate(e) {
            e.preventDefault();
            
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (newPass !== confirmPass) {
                showToast('Passwords do not match', 'error');
                return;
            }
            
            if (newPass.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }
            
            const result = await auth.updatePassword(newPass);
            
            if (result.success) {
                document.getElementById('passwordForm').reset();
            }
        }
        
        function signOutAll() {
            auth.signOut();
        }
        
        window.initProfilePage = initProfilePage;
        window.handleProfileUpdate = handleProfileUpdate;
        window.handlePasswordUpdate = handlePasswordUpdate;
        window.signOutAll = signOutAll;
    </script>
</body>
</html>
