<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | Blitz & Glitz Attendance System</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Scripts -->
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        async function initReportsPage() {
            const content = document.getElementById('mainContent');
            
            content.innerHTML = `
                <div class="animate-slide-up">
                    <!-- Report Filters -->
                    <div class="card" style="margin-bottom: var(--space-8);">
                        <div class="card-header">
                            <h3 class="card-title">Generate Report</h3>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--space-4);">
                                <div class="form-group">
                                    <label class="form-label">Report Type</label>
                                    <select class="form-select" id="reportType">
                                        <option value="monthly">Monthly Summary</option>
                                        <option value="daily">Daily Breakdown</option>
                                        <option value="member">Member-wise</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Start Date</label>
                                    <input type="date" class="form-input" id="reportStartDate">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">End Date</label>
                                    <input type="date" class="form-input" id="reportEndDate">
                                </div>
                                <div class="form-group" id="memberSelectGroup" style="display: none;">
                                    <label class="form-label">Member</label>
                                    <select class="form-select" id="reportMember">
                                        <option value="">All Members</option>
                                    </select>
                                </div>
                            </div>
                            <div style="margin-top: var(--space-6); display: flex; gap: var(--space-3);">
                                <button class="btn btn-primary" onclick="generateReport()">
                                    <i class="fas fa-chart-pie"></i> Generate Report
                                </button>
                                <button class="btn btn-secondary" onclick="exportReport()">
                                    <i class="fas fa-file-export"></i> Export CSV
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Report Results -->
                    <div id="reportResults">
                        <div class="card">
                            <div class="card-body">
                                <div class="empty-state" style="padding: var(--space-12);">
                                    <div class="empty-icon">
                                        <i class="fas fa-chart-bar"></i>
                                    </div>
                                    <h4 class="empty-title">Generate a Report</h4>
                                    <p class="empty-description">Select report parameters above to view analytics</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            // Set default dates
            const startOfMonth = new Date();
            startOfMonth.setDate(1);
            const today = new Date();
            
            document.getElementById('reportStartDate').value = startOfMonth.toISOString().split('T')[0];
            document.getElementById('reportEndDate').value = today.toISOString().split('T')[0];
            
            // Load members for dropdown
            const users = await admin.getAllUsers();
            const memberSelect = document.getElementById('reportMember');
            memberSelect.innerHTML = '<option value="">All Members</option>' +
                users.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
            
            // Show/hide member select based on report type
            document.getElementById('reportType').addEventListener('change', (e) => {
                const memberGroup = document.getElementById('memberSelectGroup');
                memberGroup.style.display = e.target.value === 'member' ? 'block' : 'none';
            });
        }
        
        async function generateReport() {
            const type = document.getElementById('reportType').value;
            const startDate = document.getElementById('reportStartDate').value;
            const endDate = document.getElementById('reportEndDate').value;
            const memberId = document.getElementById('reportMember').value;
            
            const resultsContainer = document.getElementById('reportResults');
            resultsContainer.innerHTML = '<div class="loading" style="padding: var(--space-12);"></div>';
            
            const stats = await attendance.getStats(startDate, endDate, memberId || null);
            
            if (!stats || stats.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="card">
                        <div class="card-body">
                            <div class="empty-state">
                                <div class="empty-icon">
                                    <i class="fas fa-inbox"></i>
                                </div>
                                <h4 class="empty-title">No data available</h4>
                                <p class="empty-description">No attendance records found for the selected period</p>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }
            
            // Calculate totals
            const totals = stats.reduce((acc, s) => ({
                present: acc.present + (s.present_days || 0),
                absent: acc.absent + (s.absent_days || 0),
                late: acc.late + (s.late_days || 0),
                half_day: acc.half_day + (s.half_day || 0),
                total: acc.total + (s.total_days || 0)
            }), { present: 0, absent: 0, late: 0, half_day: 0, total: 0 });
            
            resultsContainer.innerHTML = `
                <div class="stats-grid" style="margin-bottom: var(--space-8);">
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon present">
                                <i class="fas fa-check-circle"></i>
                            </div>
                        </div>
                        <div class="stat-value">${totals.present}</div>
                        <div class="stat-label">Total Present Days</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon absent">
                                <i class="fas fa-times-circle"></i>
                            </div>
                        </div>
                        <div class="stat-value">${totals.absent}</div>
                        <div class="stat-label">Total Absent Days</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon late">
                                <i class="fas fa-clock"></i>
                            </div>
                        </div>
                        <div class="stat-value">${totals.late}</div>
                        <div class="stat-label">Total Late Days</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-header">
                            <div class="stat-icon total">
                                <i class="fas fa-percentage"></i>
                            </div>
                        </div>
                        <div class="stat-value">${Math.round((totals.present / (totals.total || 1)) * 100)}%</div>
                        <div class="stat-label">Overall Attendance Rate</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Detailed Statistics</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Member</th>
                                        <th>Total Days</th>
                                        <th>Present</th>
                                        <th>Absent</th>
                                        <th>Late</th>
                                        <th>Half Day</th>
                                        <th>Rate</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${stats.map(s => `
                                        <tr>
                                            <td>
                                                <div style="display: flex; align-items: center; gap: var(--space-3);">
                                                    <div class="user-avatar" style="width: 32px; height: 32px; font-size: 0.75rem;">
                                                        ${auth.getUserInitials(s.user_name)}
                                                    </div>
                                                    <span>${s.user_name}</span>
                                                </div>
                                            </td>
                                            <td>${s.total_days}</td>
                                            <td>${s.present_days || 0}</td>
                                            <td>${s.absent_days || 0}</td>
                                            <td>${s.late_days || 0}</td>
                                            <td>${s.half_days || 0}</td>
                                            <td>
                                                <span class="status-badge ${(s.attendance_rate || 0) >= 80 ? 'success' : (s.attendance_rate || 0) >= 60 ? 'warning' : 'absent'}">
                                                    ${Math.round(s.attendance_rate || 0)}%
                                                </span>
                                            </td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
        }
        
        async function exportReport() {
            const type = document.getElementById('reportType').value;
            const startDate = document.getElementById('reportStartDate').value;
            const endDate = document.getElementById('reportEndDate').value;
            const memberId = document.getElementById('reportMember').value;
            
            const data = await admin.getAllAttendance({
                startDate,
                endDate,
                userId: memberId || undefined
            });
            
            admin.exportToCSV(data);
        }
        
        window.initReportsPage = initReportsPage;
        window.generateReport = generateReport;
        window.exportReport = exportReport;
    </script>
</body>
</html>
